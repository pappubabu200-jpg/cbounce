kind = "web"
previewPath = "/"
title = "CleanBounce"
version = "1.0.0"
id = "artifacts/cleanbounce"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22755

[services.development]
run = "pnpm --filter @workspace/cleanbounce run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cleanbounce", "run", "build" ]
publicDir = "artifacts/cleanbounce/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22755"
BASE_PATH = "/"
