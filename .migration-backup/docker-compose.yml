services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: cbounce
      POSTGRES_PASSWORD: cbounce_dev
      POSTGRES_DB: cbounce
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  api:
    build: ./apps/api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cbounce:cbounce_dev@db:5432/cbounce
    depends_on:
      - db
      - redis

  web:
    build: ./apps/web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api
